<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe PRO</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    text-align: center;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.board {
    display: grid;
    grid-template-columns: repeat(3, 110px);
    gap: 6px;
    justify-content: center;
    margin-top: 20px;
}

.cell {
    width: 110px;
    height: 110px;
    background: #1e293b;
    font-size: 55px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
}

.cell:hover {
    background: #334155;
    transform: scale(1.05);
}

.x { color: red; animation: pop 0.2s; }
.o { color: cyan; border-radius: 50%; animation: pop 0.2s; }

@keyframes pop {
    from { transform: scale(0); }
    to { transform: scale(1); }
}

.win {
    background: #22c55e !important;
    color: black;
}

#status { margin-top: 15px; font-size: 20px; }
#score { margin-top: 10px; }
#leaderboard { margin-top: 15px; white-space: pre-line; }

button {
    margin-top: 20px;
    padding: 10px 20px;
}
</style>
</head>

<body>

<h2>🔥 Tic Tac Toe PRO</h2>

<div id="status"></div>
<div id="score"></div>

<div class="board" id="board"></div>

<div id="leaderboard"></div>

<button onclick="resetGame()" id="restartBtn" style="display:none;">
Qayta boshlash
</button>

<audio id="winSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

let user = tg.initDataUnsafe?.user;
let username = user?.username || "Guest";
let firstName = user?.first_name || "Player";

let currentPlayer = "X";
let board = ["","","","","","","","",""];
let gameActive = true;

let scoreX = localStorage.getItem("scoreX") || 0;
let scoreO = localStorage.getItem("scoreO") || 0;

let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || {};

const winCombos = [
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

function updateScore(){
    document.getElementById("score").innerText =
    `👤 ${firstName}\nX: ${scoreX} | O: ${scoreO}`;
}

function createBoard(){
    const boardDiv = document.getElementById("board");
    boardDiv.innerHTML = "";

    board.forEach((cell,index)=>{
        let div = document.createElement("div");
        div.classList.add("cell");

        if(cell==="X") div.classList.add("x");
        if(cell==="O") div.classList.add("o");

        div.innerText = cell;
        div.onclick = ()=>makeMove(index);

        boardDiv.appendChild(div);
    });
}

function makeMove(index){
    if(board[index]!=="" || !gameActive) return;

    document.getElementById("clickSound").play();

    board[index]=currentPlayer;
    createBoard();

    if(checkWinner()) return;

    currentPlayer = currentPlayer==="X"?"O":"X";
    document.getElementById("status").innerText="Navbat: "+currentPlayer;
}

function saveScore(){
    if(!leaderboard[username]){
        leaderboard[username]=0;
    }
    leaderboard[username]++;
    localStorage.setItem("leaderboard", JSON.stringify(leaderboard));
}

function showLeaderboard(){
    let text="🏆 Leaderboard:\n";
    for(let u in leaderboard){
        text += u + ": " + leaderboard[u] + "\n";
    }
    document.getElementById("leaderboard").innerText=text;
}

function checkWinner(){
    for(let combo of winCombos){
        let [a,b,c]=combo;

        if(board[a] && board[a]===board[b] && board[a]===board[c]){
            gameActive=false;

            highlightWin(a,b,c);
            document.getElementById("winSound").play();

            if(board[a]==="X"){
                scoreX++;
                localStorage.setItem("scoreX",scoreX);
                document.getElementById("status").innerText="X yutdi 🔥";
            } else {
                scoreO++;
                localStorage.setItem("scoreO",scoreO);
                document.getElementById("status").innerText="O yutdi 🔥";
            }

            saveScore();
            showLeaderboard();
            updateScore();

            document.getElementById("restartBtn").style.display="block";
            return true;
        }
    }

    if(!board.includes("")){
        gameActive=false;
        document.getElementById("status").innerText="Durrang 🤝";
        document.getElementById("restartBtn").style.display="block";
        return true;
    }

    return false;
}

function highlightWin(a,b,c){
    let cells=document.getElementsByClassName("cell");
    cells[a].classList.add("win");
    cells[b].classList.add("win");
    cells[c].classList.add("win");
}

function resetGame(){
    board=["","","","","","","","",""];
    gameActive=true;
    currentPlayer="X";

    document.getElementById("status").innerText="Navbat: X";
    document.getElementById("restartBtn").style.display="none";

    createBoard();
}

tg.MainButton.setText("🔄 Qayta boshlash");
tg.MainButton.show();
tg.MainButton.onClick(resetGame);

updateScore();
showLeaderboard();
createBoard();

document.getElementById("status").innerText="Navbat: X";
</script>

</body>
</html>
